<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Today's Activities</title>
  <style>
    /* ===== RESET & BASE ===== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #c2e9fb 0%, #a1c4fd 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }

    h1 {
      color: #339668;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 1.5rem;
      padding: 1.5rem 3rem;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
      margin-bottom: 2rem;
    }

    /* ===== HOME BUTTON ===== */
    .home-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(255, 255, 255, 0.15);
      color: #339668;
      font-weight: 600;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 50px;
      padding: 0.6rem 1.5rem;
      text-decoration: none;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .home-btn:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
    }

    /* ===== CARD ===== */
    .card {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(10px);
      border-radius: 1rem;
      padding: 2rem;
      width: 100%;
      max-width: 600px;
      margin: 1rem auto;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      color: #333;
    }

    h2 {
      color: #333;
      margin-bottom: 1rem;
    }

    input,
    select,
    button {
      padding: 0.6rem;
      border: 1px solid rgba(0, 0, 0, 0.2);
      border-radius: 0.5rem;
      margin-top: 0.5rem;
      font-size: 1rem;
    }

    button {
      background-color: #4b6cb7;
      color: white;
      font-weight: bold;
      cursor: pointer;
      border: none;
      transition: 0.3s ease;
    }

    button:hover {
      background-color: #182848;
      transform: translateY(-2px);
    }

    .error {
      color: red;
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      margin: 0.6rem 0;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      background: rgba(255, 255, 255, 0.3);
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: 0.3s ease;
    }

    li:hover {
      background: rgba(255, 255, 255, 0.5);
    }

    .completed {
      text-decoration: line-through;
      color: gray;
      opacity: 0.7;
    }

    #taskList {
      min-height: 120px;
    }
  </style>
</head>

<body>
  <a href="index.html" class="home-btn">🏠 Home</a>
  <h1>Today's Activities!</h1>

  <section class="card">
    <h2>What to do?</h2>
    <form id="taskForm">
      <label>
        Task Title:
        <input id="taskTitle" name="title" required minlength="4" placeholder="e.g. Go for a walk!">
      </label>

      <label>
        Priority:
        <select name="priority" id="taskPriority">
          <option value="">Select priority</option>
          <option>Low</option>
          <option>Medium</option>
          <option>High</option>
        </select>
      </label>

      <button type="submit">Add task</button>
      <p id="formError" class="error"></p>
    </form>
  </section>

  <section class="card">
    <h2>These need to be done!</h2>
    <ul id="taskList"></ul>
    <button id="clearTasks">Clear All</button>
  </section>

  <script>
    const form = document.getElementById("taskForm");
    const titleInput = document.getElementById("taskTitle");
    const prioritySelect = document.getElementById("taskPriority");
    const taskList = document.getElementById("taskList");
    const clearBtn = document.getElementById("clearTasks");
    const errorP = document.getElementById("formError");
    let tasks = [];

    function setError(msg = "") {
      errorP.textContent = msg;
    }

    function renderTasks() {
      taskList.textContent = "";
      const frag = document.createDocumentFragment();
      tasks.forEach((task, i) => {
        const li = document.createElement("li");
        li.dataset.index = i;
        li.textContent = `${task.title} (${task.priority})`;
        if (task.completed) li.classList.add("completed");
        frag.append(li);
      });
      taskList.append(frag);
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      setError("");
      const title = titleInput.value.trim();
      const priority = prioritySelect.value.trim();

      if (title.length < 4) {
        setError("Title must be at least 4 characters.");
        titleInput.focus();
        return;
      }
      if (!priority) {
        setError("Please select a priority.");
        prioritySelect.focus();
        return;
      }

      tasks.push({ title, priority, completed: false });
      form.reset();
      renderTasks();
    });

    taskList.addEventListener("click", (e) => {
      const li = e.target.closest("li");
      if (!li) return;
      const index = li.dataset.index;
      if (index === undefined) return;
      tasks[index].completed = !tasks[index].completed;
      renderTasks();
    });

    clearBtn.addEventListener("click", () => {
      tasks = [];
      renderTasks();
    });

    renderTasks();
  </script>
</body>

</html>
